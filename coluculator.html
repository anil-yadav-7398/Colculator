<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .con {
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .main {

        gap: 20px;
        padding: 20px;

        border-radius: 10px;
        border: 2px solid grey;
        background-color: rgb(58, 52, 52);
        height: 560px;
        width: 410px;
    }

    .m2 {

        background-color: rgb(70, 68, 68);
        box-shadow: 0px 0px 10px rgb(242, 239, 239);
        border-radius: 10px;
        padding: 10px;
    }

    .input {
        width: 90%;
        height: 50px;
        border-radius: 10px;
        border: 1px white;
        background-color: black;
        margin: 10px;


    }

    #ip {
        width: 100%;
        height: 50px;
        color: white;
        border-radius: 10px;
        border: 1px white;
        background-color: black;
        text-align: right;
        font-size: 30px;
        font-family: serif;
        font-weight: 1000;

    }

    .btn {
        margin: 22px;
        background-color: gray;
        width: 50px;
        height: 50px;
        border-radius: 10px;
        font-size: 20px;
        font-family: serif;
        font-weight: 1000;

    }

    .btn:hover {
        background-color: grey;
        color: white;
    }

    .zero {
        width: 240px;
    }

    .cx {
        background-color: rgb(252, 5, 5);
    }

    .v {
        background-color: rgb(33, 222, 33);
    }

    .operator {
        background-color: yellow;
    }

    @media (max-width:768px) {
        .main {
            display: flex;
            gap: 20px;
            padding: 20px;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 2px solid grey;
            background-color: rgb(58, 52, 52);
            height: 100%;
            width: 100%;
        }

        .m2 {
            border: 2px solid grey;
            background-color: rgb(70, 68, 68);
        }

        .input {
            width: 90%;
            height: 50px;
            border-radius: 10px;
            border: 1px white;
            background-color: black;
            margin: 10px;


        }

        #ip {
            width: 100%;
            height: 50px;
            color: white;
            border-radius: 10px;
            border: 1px white;
            background-color: black;
            text-align: right;
            font-size: 30px;
            font-family: serif;
            font-weight: 1000;

        }

        .btn {
            margin: 22px;
            background-color: gray;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            font-size: 20px;
            font-family: serif;
            font-weight: 1000;

        }

        .btn:hover {
            background-color: grey;
            color: white;
        }

        .zero {
            width: 240px;
        }

        .cx {
            background-color: rgb(252, 5, 5);
        }

        .v {
            background-color: rgb(33, 222, 33);
        }

        .operator {
            background-color: yellow;
        }

    }

    @media (max-width:480px) {
        .main {
            display: flex;
            gap: 20px;
            padding: 20px;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: 2px solid grey;
            background-color: rgb(58, 52, 52);

        }

        .m2 {
            height: 100%;
            width: 100%;
            border: 2px solid grey;
            background-color: rgb(70, 68, 68);
        }

        .input {
            width: 90%;
            height: 40px;
            border-radius: 10px;
            border: 1px white;
            background-color: black;
            margin: 10px;


        }

        #ip {
            width: 100%;
            height: 40px;
            color: white;
            border-radius: 10px;
            border: 1px white;
            background-color: black;
            text-align: right;
            font-size: 25px;
            font-family: serif;
            font-weight: 1000;

        }

        .btn {
            margin: 22px;
            background-color: gray;
            width: 50px;
            height: 50px;
            border-radius: 10px;
            font-size: 20px;
            font-family: serif;
            font-weight: 1000;

        }

        .btn:hover {
            background-color: grey;
            color: white;
        }

        .zero {
            width: 240px;
        }

        .cx {
            background-color: rgb(252, 5, 5);
        }

        .v {
            background-color: rgb(33, 222, 33);
        }

        .operator {
            background-color: yellow;
        }

    }
</style>

<body>
    <div class="con">


        <div class="main">
            <div class="m2">
                <div class="input">
                    <input id="ip" type="text" value="0" readonly>
                </div>
                <div>

                    <button class="btn cx" value="c">C</button>
                    <button class=" btn operator" value="x">X</button>
                    <button class="operator btn" value="%">%</button>
                    <button class="operator btn" value="/">/</button>
                </div>
                <div>
                    <button class=" number btn " value="7">7</button>
                    <button class=" number btn " value="8">8</button>
                    <button class=" number btn " value="9">9</button>
                    <button class="operator btn" value="*">*</button>
                </div>
                <div>
                    <button class=" number btn " value="4">4</button>
                    <button class=" number btn " value="5">5</button>
                    <button class=" number btn " value="6">6</button>
                    <button class="operator btn" value="-">-</button>
                </div>
                <div>
                    <button class=" number btn " value="1">1</button>
                    <button class=" number btn " value="2">2</button>
                    <button class=" number btn " value="3">3</button>
                    <button class="operator btn" value="+">+</button>
                </div>
                <div>
                    <button class="number btn zero " value="0">0</button>
                    <button class="v btn" value="=">=</button>
                </div>
            </div>

        </div>

    </div>
    <script>
        let display = document.getElementById("ip");
        let btn = document.querySelectorAll("button");
        let first = "";
        let second = "";
        let operator = "";
        for (let index = 0; index < btn.length; index++) {
            btn[index].addEventListener("click", function () {
                let value = btn[index].innerText;
                if (!isNaN(value)) {
                    if (operator == "") {
                        first += value;
                        display.value = first
                    }
                    else {
                        second += value;
                        display.value = first + operator + second;
                    }
                }
                else if (value == "+" || value == "-" || value == "/" || value == "*" || value == "%") {
                    operator = value;
                    display.value = first + operator;
                }
                else if (value == "=") {
                    let result;
                    switch (operator) {
                        case "+":
                            result = Number(first) + Number(second);
                            break;
                        case "-":
                            result = Number(first) - Number(second);
                            break;
                        case "*":
                            result = Number(first) * Number(second);
                            break;
                        case "/":
                            result = Number(first) / Number(second);
                            break;
                        case "%":
                            result = Number(first) % Number(second);
                            break;
                        default:
                            display.value = "default";
                    }


                    display.value = result;
                    first = result;
                    second = "";
                    operator = "";

                }
                else if (value == "C") {
                    first = "";
                    second = "";
                    operator = "";
                    display.value = "0";
                }
                else if (value == "X") {
                    display.value = display.value.slice(0, -1);
                    first = "";
                } else {
                    display.value += value;

                }
            });

        }
    </script>
</body>

</html>
