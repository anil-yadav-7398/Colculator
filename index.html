<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<link rel="stylesheet" href="style.css">

<body>
    <div class="con container">


        <div class="main row">
            <div class="m2 ">
                <div class="input">
                    <input id="ip" type="text" value="0" readonly>
                </div>

                <div class="col-12 d-flex justify-content-end">

                    <button class="btn cx" value="c">C</button>
                    <button class=" btn operator" value="x">X</button>
                    <button class="operator btn" value="%">%</button>
                    <button class="operator btn" value="/">/</button>
                </div>
                <div class="col d-flex justify-content-end">
                    <button class=" number btn " value="7">7</button>
                    <button class=" number btn " value="8">8</button>
                    <button class=" number btn " value="9">9</button>
                    <button class="operator btn" value="*">*</button>
                </div>
                <div class="col d-flex justify-content-end">
                    <button class=" number btn " value="4">4</button>
                    <button class=" number btn " value="5">5</button>
                    <button class=" number btn " value="6">6</button>
                    <button class="operator btn" value="-">-</button>
                </div>
                <div class="col d-flex justify-content-end">
                    <button class=" number btn " value="1">1</button>
                    <button class=" number btn " value="2">2</button>
                    <button class=" number btn " value="3">3</button>
                    <button class="operator btn" value="+">+</button>
                </div>
                <div class="col d-flex justify-content-end">
                    <button class="number btn zero " value="0">0</button>
                    <button class="v btn" value="=">=</button>
                </div>
            </div>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <script src="javascript.js"></script>
</body>

</html>
